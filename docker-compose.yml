version: '3.8'

services:
  # PostgreSQL - Main application database
  postgres:
    image: postgres:15-alpine
    container_name: pharma_analytics_db
    environment:
      POSTGRES_USER: ${DB_USER:-pharma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pharma_password}
      POSTGRES_DB: ${DB_NAME:-pharma_analytics_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pharma_user} -d ${DB_NAME:-pharma_analytics_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Used ONLY for Celery broker and result backend
  redis:
    image: redis:7-alpine
    container_name: pharma_analytics_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Flask Backend Application
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: pharma_analytics_backend
    environment:
    - FLASK_ENV=${FLASK_ENV:-development}
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/0
    - DB_NAME=pharma_analytics_db
    - DB_USER=pharma_user
    - DB_PASSWORD=pharma_password
    - DB_HOST=postgres
    - DB_PORT=5432
    - DATABASE_URL=postgresql://pharma_user:pharma_password@postgres:5432/pharma_analytics_db

    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python run.py

  # Celery Worker - Background task processor
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: pharma_analytics_celery
    environment:
       - DB_NAME=pharma_analytics_db
       - DB_USER=pharma_user
       - DB_PASSWORD=pharma_password
       - DB_HOST=postgres
       - DB_PORT=5432
       - DATABASE_URL=postgresql://pharma_user:pharma_password@postgres:5432/pharma_analytics_db
       - REDIS_HOST=redis
       - REDIS_PORT=6379
       - CELERY_BROKER_URL=redis://redis:6379/0
       - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_worker worker --loglevel=info

volumes:
  postgres_data:
  redis_data:

